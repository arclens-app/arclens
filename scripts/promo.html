<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root{
    --arc:#3b6bff; --arc2:#6691ff; --green:#00c896;
    --t1:#eef1f8; --t2:#9aa3ba; --t3:#5b6582;
  }
  html,body{ width:1600px; height:900px; }
  .stage{
    position:relative; width:1600px; height:900px; overflow:hidden;
    background:
      radial-gradient(900px 520px at 88% -8%, rgba(59,107,255,0.30), transparent 60%),
      radial-gradient(700px 500px at 8% 110%, rgba(0,200,150,0.10), transparent 60%),
      linear-gradient(160deg, #070a14 0%, #0a0e1c 55%, #070a14 100%);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    color:var(--t1);
  }
  /* subtle dot grid */
  .stage::before{
    content:""; position:absolute; inset:0;
    background-image: radial-gradient(rgba(255,255,255,0.045) 1px, transparent 1px);
    background-size: 26px 26px; mask-image: linear-gradient(180deg, #000 0%, transparent 70%);
  }
  .wrap{ position:relative; padding:64px 70px; height:100%; display:flex; flex-direction:column; }

  /* header */
  .brandrow{ display:flex; align-items:center; gap:14px; }
  .mark{ width:42px; height:42px; border-radius:12px; background:linear-gradient(135deg,var(--arc),#4a78ff);
         box-shadow:0 6px 20px rgba(59,107,255,0.45), inset 0 1px 0 rgba(255,255,255,0.3);
         display:flex; align-items:center; justify-content:center; }
  .mark span{ width:17px; height:17px; border-radius:50%; border:3px solid rgba(255,255,255,0.92); box-shadow:0 0 8px rgba(255,255,255,0.4); }
  .wordmark{ font-size:26px; font-weight:800; letter-spacing:-0.03em; }
  .wordmark b{ color:var(--arc2); font-weight:800; }
  .pill{ margin-left:8px; display:inline-flex; align-items:center; gap:7px; padding:6px 13px; border-radius:999px;
         background:rgba(0,200,150,0.10); border:1px solid rgba(0,200,150,0.28); color:var(--green);
         font-size:13px; font-family:ui-monospace,monospace; }
  .pill i{ width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); display:inline-block; }

  h1{ margin-top:30px; font-size:64px; line-height:1.02; letter-spacing:-0.035em; font-weight:800; }
  h1 .b{ color:var(--arc2); }
  .sub{ margin-top:18px; font-size:21px; color:var(--t2); max-width:560px; line-height:1.5; }
  .tags{ margin-top:20px; display:flex; gap:10px; }
  .tag{ font-size:14px; font-family:ui-monospace,monospace; color:var(--t2); padding:7px 14px; border-radius:9px;
        background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); }

  /* collage */
  .collage{ position:absolute; right:56px; bottom:52px; width:858px; height:712px; }
  .frame{ position:absolute; border-radius:16px; overflow:hidden;
          border:1px solid rgba(255,255,255,0.10);
          box-shadow:0 40px 90px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.03); background:#0b0e16; }
  .frame img{ display:block; width:100%; height:auto; }
  .ai     { width:338px; left:0;    top:2px;  transform:rotate(-2.5deg); z-index:3; }
  .wallet { width:352px; right:4px; top:18px; transform:rotate(3deg);    z-index:4; }
  .metrics{ width:782px; left:30px; bottom:0; z-index:2; }
  .metrics img{ filter:saturate(1.02); }

  .foot{ position:absolute; left:70px; bottom:54px; display:flex; align-items:center; gap:10px; }
  .foot .url{ font-size:24px; font-weight:700; letter-spacing:-0.01em; }
  .foot .arrow{ color:var(--arc2); font-size:24px; }
</style>
</head>
<body>
  <div class="stage">
    <div class="wrap">
      <div class="brandrow">
        <div class="mark"><span></span></div>
        <div class="wordmark">Arc<b>Lens</b></div>
        <div class="pill"><i></i> live on Arc</div>
      </div>

      <h1>Ask anything.<br><span class="b">Track everything.</span></h1>
      <div class="sub">Meet <b style="color:#fff">ArcLens AI</b> — answers grounded in live on-chain data. Plus deployer-verified TVL, volume &amp; revenue, and an in-app USDC + EURC wallet.</div>
      <div class="tags">
        <div class="tag">◆ ArcLens AI</div>
        <div class="tag">◆ Live protocol metrics</div>
        <div class="tag">◆ In-app wallet</div>
      </div>

      <div class="foot"><span class="url">arclenz.xyz</span><span class="arrow">→</span></div>
    </div>

    <div class="collage">
      <div class="frame metrics"><img src="file:///C:/Users/eobi6/OneDrive/Pictures/Screenshots/Screenshot%202026-05-31%20103227.png"></div>
      <div class="frame wallet"><img src="file:///C:/Users/eobi6/OneDrive/Pictures/Screenshots/Screenshot%202026-05-31%20103345.png"></div>
      <div class="frame ai"><img src="file:///C:/Users/eobi6/OneDrive/Pictures/Screenshots/Screenshot%202026-05-31%20103440.png"></div>
    </div>
  </div>
</body>
</html>
